name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Run pytest (排除依赖外部网络/可选库)
        run: |
          pytest tests/ \
            --ignore=tests/test_continuous_optimization.py \
            --ignore=tests/test_phase3_sentiment.py \
            --ignore=tests/test_phase6_pipeline.py \
            --deselect tests/test_daily_pipeline.py::test_run_daily_pipeline_combines_step_results \
            --cov=. --cov-report=term --cov-report=xml -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
